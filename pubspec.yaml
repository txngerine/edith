name: edith
description: EDITH - Even Dead Im The Hero. Privacy-first ephemeral messaging.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  get: ^4.7.3
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  video_player: ^2.8.6
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  local_auth: ^2.1.8
  crypto: ^3.0.3
  uuid: ^4.4.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  mobile_scanner: ^7.2.0
  lottie: ^3.1.2
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  webview_flutter: ^4.10.0
  qr_flutter: ^4.1.0
  nearby_connections: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
